server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes fall back to index.html (React SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
