version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Agentic Soccer Coach – docker-compose
#
# Usage:
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    build:
      context: ./redisserver
    container_name: agentic_soccer_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}   # set in .env or leave blank for no auth
    ports:
      - "6379:6379"
    volumes:
      # Persist Redis data across container restarts so chat history / cache survives rebuilds
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Flask + LangGraph + Wine/PAT3) ────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: agentic_soccer_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # If REDIS_PASSWORD is set, the URL needs it; otherwise use the plain form.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount tools/ and model/ so host edits are reflected immediately
      # during development (overrides the COPY in the Dockerfile).
      - ./backend/tools:/app/tools
      - ./backend/model:/app/model
      # Read-only mounts for data the backend reads but never writes.
      - ./pcsp_model:/app/pcsp_model:ro
      - ./data/processed:/app/data/processed:ro

  # ── Frontend (React → nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: agentic_soccer_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  redis_data:
